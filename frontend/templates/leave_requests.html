{% extends "base.html" %}
{% block content %}

<div class="page-header">
    <div class="page-header-icon">📝</div>
    <div>
        <h1>Leave Requests</h1>
        <p>Review and manage student leave applications.</p>
    </div>
</div>

<!-- Filters in leaves requirement -->
<div class="filter-bar">
    <label for="leaveFilter">Filter by Status:</label>
    <select id="leaveFilter" class="filter-select" onchange="filterLeaves()">
        <option value="all">All Requests</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
    </select>
</div>

<table>
    <thead>
        <tr>
            <th>Student</th>
            <th>ID</th>
            <th>Reason</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="leaveTable">
        <tr><td colspan="5" style="text-align:center; color:var(--muted); padding:32px;">Loading...</td></tr>
    </tbody>
</table>

<script>
let allLeaves = [];

fetch("/leaves")
.then(res => res.json())
.then(data => {
    allLeaves = data;
    renderLeaves(data);
});

function renderLeaves(data) {
    const table = document.getElementById("leaveTable");
    if (data.length === 0) {
        table.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:32px;">No leave requests found.</td></tr>`;
        return;
    }

    table.innerHTML = '';
    data.forEach(l => {
        const row = document.createElement("tr");
        const badgeClass = l.status === 'approved' ? 'badge-approved' : l.status === 'rejected' ? 'badge-rejected' : 'badge-pending';

        row.innerHTML = `
            <td style="font-weight:600;color:var(--text);">${l.name}</td>
            <td style="font-family:monospace;">${l.student_id}</td>
            <td style="max-width:250px;">${l.reason}</td>
            <td><span class="badge ${badgeClass}">${l.status.charAt(0).toUpperCase() + l.status.slice(1)}</span></td>
            <td>
                ${l.status === "pending"
                    ? `<button class="btn-approve" onclick="approve(${l.id})">Approve</button>
                       <button class="btn-reject" onclick="reject(${l.id})">Reject</button>`
                    : `<span style="color:var(--muted);font-size:13px;">Handled</span>`
                }
            </td>
        `;
        table.appendChild(row);
    });
}

function filterLeaves() {
    const filter = document.getElementById("leaveFilter").value;
    if (filter === "all") {
        renderLeaves(allLeaves);
    } else {
        const filtered = allLeaves.filter(l => l.status === filter);
        renderLeaves(filtered);
    }
}

function approve(id) { fetch("/approve-leave", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({leave_id: id}) }).then(()=>location.reload()); }
function reject(id) { fetch("/reject-leave", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({leave_id: id}) }).then(()=>location.reload()); }
</script>

{% endblock %}
