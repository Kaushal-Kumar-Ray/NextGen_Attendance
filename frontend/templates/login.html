{% extends "base.html" %}
{% block content %}

<div class="center">
<div class="card" style="max-width:400px; width:100%;">

    <h2>Login</h2>

    <!-- ROLE SELECT -->
    <select id="role" onchange="toggleLogin()">
        <option value="student">Student</option>
        <option value="admin">Admin</option>
    </select>

    <!-- STUDENT LOGIN -->
    <div id="studentLogin">
        <input type="text" id="id" placeholder="Student Name">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="adminLogin" style="display:none;">
        <input type="text" id="admin_id" placeholder="Admin ID">
        <input type="email" id="admin_email" placeholder="Admin Email">

        <button onclick="sendOtp()">Send OTP</button>

        <div id="otpSection" style="display:none;">
            <input type="text" id="otp" placeholder="Enter OTP">
            <button onclick="verifyOtp()">Verify OTP</button>
        </div>
    </div>

</div>
</div>

<script>

// 🔁 SWITCH UI
function toggleLogin() {
    const role = document.getElementById("role").value;

    if (role === "admin") {
        document.getElementById("studentLogin").style.display = "none";
        document.getElementById("adminLogin").style.display = "block";
    } else {
        document.getElementById("studentLogin").style.display = "block";
        document.getElementById("adminLogin").style.display = "none";
    }
}

// 👨‍🎓 STUDENT LOGIN
function login(){
    const id = document.getElementById("id").value;
    const password = document.getElementById("password").value;

    fetch("/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id,password,role:"student"})
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.success){
            window.location.href = "/student-dashboard";
        } else alert(data.message);
    });
}

// 👨‍💼 SEND OTP
function sendOtp() {
    const id = document.getElementById("admin_id").value;
    const email = document.getElementById("admin_email").value;

    fetch("/admin/send-otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id, email})
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("OTP sent to your email");
            document.getElementById("otpSection").style.display = "block";
        } else {
            alert(data.message);
        }
    });
}

// 🔐 VERIFY OTP
function verifyOtp() {
    const email = document.getElementById("admin_email").value;
    const otp = document.getElementById("otp").value;

    fetch("/admin/verify-otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, otp})
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.location.href = "/dashboard";
        } else {
            alert(data.message);
        }
    });
}

</script>

{% endblock %}
