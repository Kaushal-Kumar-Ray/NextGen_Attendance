{% extends "base.html" %}
{% block content %}

<style>
body {
    background: linear-gradient(135deg, #0f172a, #020617);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

.center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

.card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(18px);
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
    border: 1px solid rgba(255,255,255,0.1);
}

/* LOGO */
.logo {
    width: 70px;
    display: block;
    margin: 0 auto 10px;
}

/* TITLE */
.title {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 20px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #06b6d4, #3b82f6);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.85;
}

/* ROLE SWITCH LABEL */
.role-label {
    font-size: 12px;
    margin-top: 10px;
    color: #94a3b8;
}
</style>


<div class="center">
<div class="card" style="max-width:400px; width:100%;">

    <!-- 🔥 LOGO -->
    <img src="{{ url_for('static', filename='images/image1.png') }}" class="logo">

    <!-- 🔥 BRAND -->
    <div class="title">NextGen Attendance</div>
    <div class="subtitle">Secure AI-Based Attendance System</div>

    <!-- ROLE SELECT -->
    <div class="role-label">Login as</div>
    <select id="role" onchange="toggleLogin()">
        <option value="student">Student</option>
        <option value="admin">Admin</option>
    </select>

    <!-- STUDENT LOGIN -->
    <div id="studentLogin">
        <input type="text" id="id" placeholder="Student ID">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="adminLogin" style="display:none;">
        <input type="text" id="admin_id" placeholder="Admin ID">
        <input type="email" id="admin_email" placeholder="Admin Email">

        <button onclick="sendOtp()">Send OTP</button>

        <div id="otpSection" style="display:none;">
            <input type="text" id="otp" placeholder="Enter OTP">
            <button onclick="verifyOtp()">Verify OTP</button>
        </div>
    </div>

</div>
</div>

<script>

// 🔁 SWITCH UI
function toggleLogin() {
    const role = document.getElementById("role").value;

    if (role === "admin") {
        document.getElementById("studentLogin").style.display = "none";
        document.getElementById("adminLogin").style.display = "block";
    } else {
        document.getElementById("studentLogin").style.display = "block";
        document.getElementById("adminLogin").style.display = "none";
    }
}

// 👨‍🎓 STUDENT LOGIN
function login(){
    const id = document.getElementById("id").value;
    const password = document.getElementById("password").value;

    fetch("/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id,password,role:"student"})
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.success){
            window.location.href = "/student-dashboard";
        } else alert(data.message);
    });
}

// 👨‍💼 SEND OTP
function sendOtp() {
    const id = document.getElementById("admin_id").value;
    const email = document.getElementById("admin_email").value;

    fetch("/admin/send-otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id, email})
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("OTP sent to your email");
            document.getElementById("otpSection").style.display = "block";
        } else {
            alert(data.message);
        }
    });
}

// 🔐 VERIFY OTP
function verifyOtp() {
    const email = document.getElementById("admin_email").value;
    const otp = document.getElementById("otp").value;

    fetch("/admin/verify-otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, otp})
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.location.href = "/dashboard";
        } else {
            alert(data.message);
        }
    });
}

</script>

{% endblock %}
