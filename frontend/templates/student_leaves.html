{% extends "base.html" %}
{% block content %}

<div class="page-header">
    <div class="page-header-icon">📋</div>
    <div>
        <h1>My Leave Requests</h1>
        <p>Track all your submitted leave applications</p>
    </div>
</div>

<table>
    <thead>
        <tr>
            <th>Reason</th>
            <th>Status</th>
            <th>Submitted On</th>
        </tr>
    </thead>
    <tbody id="leaveTable">
        <tr><td colspan="3" style="text-align:center;color:var(--muted);padding:32px;">Loading...</td></tr>
    </tbody>
</table>

<script>
fetch("/api/student-leaves")
.then(res => res.json())
.then(data => {
    const table = document.getElementById("leaveTable");
    if (!Array.isArray(data) || data.length === 0) {
        table.innerHTML = `<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:32px;">No leave requests found</td></tr>`;
        return;
    }
    table.innerHTML = '';
    data.forEach(l => {
        const row = document.createElement("tr");
        const statusClean = l.status.toLowerCase();
        const badgeClass = statusClean === 'approved' ? 'badge-approved' : statusClean === 'rejected' ? 'badge-rejected' : 'badge-pending';
        row.innerHTML = `
            <td style="color:var(--text); font-weight:500;">${l.reason}</td>
            <td><span class="badge ${badgeClass}">${l.status.charAt(0).toUpperCase() + l.status.slice(1)}</span></td>
            <td style="color:var(--muted);font-size:13px;">${l.created_at}</td>
        `;
        table.appendChild(row);
    });
})
</script>

{% endblock %}
