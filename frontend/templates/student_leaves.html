{% extends "base.html" %}
{% block content %}

<h1>My Leave Requests</h1>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>Reason</th>
                <th>Status</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody id="leaveTable"></tbody>
    </table>
</div>

<script>
fetch("/student-leaves")   // 🔥 no ID needed
.then(res => res.json())
.then(data => {
    const table = document.getElementById("leaveTable");

    if (!data || data.length === 0) {
        table.innerHTML = "<tr><td colspan='3'>No leaves found</td></tr>";
        return;
    }

    data.forEach(l => {
        const row = document.createElement("tr");

        let color = "#fff";
        if (l.status === "approved") color = "#00f5ff";
        if (l.status === "rejected") color = "#ff4d4d";
        if (l.status === "pending") color = "#ffd166";

        row.innerHTML = `
            <td>${l.reason}</td>
            <td style="color:${color}; font-weight:bold">${l.status}</td>
            <td>${l.created_at}</td>
        `;

        table.appendChild(row);
    });
})
.catch(() => {
    document.getElementById("leaveTable").innerHTML =
        "<tr><td colspan='3'>Error loading data</td></tr>";
});
</script>

{% endblock %}
